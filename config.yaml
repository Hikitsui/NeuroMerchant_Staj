behaviors:
  MerchantAgent:
    trainer_type: ppo
    hyperparameters:
      batch_size: 512        # Eskisi 128 — büyük obs uzayı için artırıldı
      buffer_size: 20480     # Eskisi 4096 — 4 branch için daha fazla veri
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 5           # Eskisi 3
      learning_rate_schedule: linear
      beta_schedule: linear
      epsilon_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 512      # Eskisi 256 — 281 giriş için daha geniş ağ
      num_layers: 3          # Eskisi 2
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    max_steps: 5000000       # Eskisi 1M — curriculum 8 ders için daha uzun
    time_horizon: 512        # Eskisi 256
    summary_freq: 5000
    keep_checkpoints: 5
    checkpoint_interval: 500000